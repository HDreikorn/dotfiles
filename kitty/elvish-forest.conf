# ✧ Elvish Forest Theme for Kitty ✧
# A prompt that flows like the paths of Lothlórien
#
# Usage: include this file in your kitty.conf:
#   include ~/dotfiles/kitty/elvish-forest.conf

# ── Font ──────────────────────────────────────────
font_family      CaskaydiaCove Nerd Font Mono
font_size        12.0
disable_ligatures never

# ── Window ────────────────────────────────────────
background_opacity 0.9

# ── Colors (Dark) ─────────────────────────────────
foreground #838685
background #2F4739

# Cursor
cursor #98ECB5
cursor_text_color #000000

# Selection
selection_foreground #000000
selection_background #AE9DE9

# URL
url_color #71E990

# ── ANSI Colors ───────────────────────────────────
# Black
color0  #14191E
color8  #686868

# Red
color1  #B43C29
color9  #DD7975

# Green
color2  #00C200
color10 #58E790

# Yellow
color3  #C7C400
color11 #ECE100

# Blue
color4  #2744C8
color12 #A7ABF2

# Magenta
color5  #C040BE
color13 #E17EE1

# Cyan
color6  #00C5C7
color14 #60FDFF

# White
color7  #C7C7C7
color15 #FFFFFF
